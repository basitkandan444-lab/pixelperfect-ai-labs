# Automated dependency & CI action updates.
# Grouped, weekly PRs keep the surface small and reviewable.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch low-risk, related upgrades into single PRs.
      radix-ui:
        patterns:
          - "@radix-ui/*"
      tanstack:
        patterns:
          - "@tanstack/*"
      dev-tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "typescript-eslint"
          - "prettier*"
          - "vitest"
          - "typescript"
    labels:
      - "dependencies"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"

name: CI

# Quality gate for every push and pull request. Mirrors the local `bun run check`
# plus a full production build so broken code never reaches the default branch.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Test (with coverage gate)
        run: bun run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 7

      - name: Production build
        run: bun run build

      - name: Bundle budget check
        # Fails the build if client JS/CSS payload exceeds BUNDLE_BUDGETS
        # (src/lib/ops.ts). Guards LCP/TTI against silent payload regressions.
        run: bun run bundle:check

  e2e:
    name: End-to-end (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        # All engines in the project matrix (Chromium, Firefox, WebKit) so the
        # functional + accessibility suites run cross-engine on desktop & mobile.
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Run end-to-end tests
        run: bun run test:e2e

      - name: Upload Playwright report
        # Always upload: the HTML report is the primary diagnostic for both
        # passing (timings) and failing (trace, video, screenshots) runs.
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Report known vulnerabilities without failing the build on advisories that
      # have no available fix. Review the output on every PR.
      - name: Audit dependencies
        run: bun audit || true
